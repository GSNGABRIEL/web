version: '3.8'

services:
  backend:
    build: ./backend
    container_name: mineradora-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production

  frontend:
    build: ./frontend
    container_name: mineradora-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
