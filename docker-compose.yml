version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mineradora-db
    restart: always
    ports:
      - "${DB_PORT_HOST:-5434}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-mineradora_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mineradora_password}
      POSTGRES_DB: ${DB_NAME:-mineradora_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: mineradora-backend
    restart: always
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DB_USER=${DB_USER:-mineradora_user}
      - DB_PASSWORD=${DB_PASSWORD:-mineradora_password}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-mineradora_db}
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: mineradora-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
